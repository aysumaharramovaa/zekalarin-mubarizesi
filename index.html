<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zəkaların Mübarizəsi II</title>
    <link src="style.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
  </head>
  <body class="bg-slate-950 text-slate-200 min-h-screen">
    <!-- HEADER -->
    <header
      class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-xl sticky top-0 z-50"
    >
      <div
        class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between"
      >
        <div class="flex items-center gap-x-3">
          <div
            class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-violet-500 rounded-2xl flex items-center justify-center text-3xl"
          ></div>
          <!-- <h1 class="text-3xl font-semibold tracking-tighter logo-glow">
            Zəkaların Mübarizəsi <span class="text-cyan-400">II</span>
          </h1> -->
        </div>

        <div
          id="header-info"
          class="hidden items-center gap-x-8 text-sm font-medium"
        >
          <div
            onclick="goBackToCategories()"
            class="flex items-center gap-x-2 cursor-pointer hover:text-cyan-400"
          >
            <span class="text-xl">←</span>
            <span>Kateqoriyalara qayıt</span>
          </div>
          <div
            id="current-category-display"
            class="px-5 py-2 bg-slate-900 rounded-3xl text-cyan-400 font-medium"
          ></div>
        </div>
      </div>
    </header>

    <!-- KATEQORİYA EKRANI -->
    <div id="category-screen" class="max-w-7xl mx-auto px-8 py-12">
      <div class="text-center mb-16">
        <h2 class="text-5xl font-semibold tracking-tighter mb-4">
          Zəkaların Mübarizəsi II
        </h2>
        <p class="text-slate-400 text-xl">Kateqoriya seçin</p>
      </div>
      <div
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
        id="categories-grid"
      ></div>
    </div>

    <!-- QUIZ EKRANI -->
    <div id="quiz-screen" class="hidden max-w-4xl mx-auto px-8 py-10">
      <!-- ... (quiz ekranı eyni qalır) ... -->
      <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-x-4">
          <span class="font-medium">Sual</span>
          <span id="question-counter" class="text-4xl font-bold text-cyan-400"
            >1</span
          >
          <span class="text-slate-400">/</span>
          <span id="total-questions" class="text-slate-400">3</span>
        </div>

        <div class="flex items-center bg-slate-900 rounded-3xl px-6 py-3">
          <span class="text-2xl mr-3">⏳</span>
          <div>
            <div class="text-xs tracking-widest">QALAN VAXT</div>
            <div
              id="timer-display"
              class="text-4xl font-bold font-mono text-cyan-400"
            >
              20
            </div>
          </div>
        </div>

        <div
          id="quiz-category-badge"
          class="px-6 py-2 bg-gradient-to-r from-cyan-400 to-violet-500 text-slate-950 rounded-3xl font-semibold"
        ></div>
      </div>

      <div class="bg-slate-900 border border-slate-700 rounded-3xl p-10 mb-8">
        <div
          id="question-text"
          class="text-3xl font-medium leading-tight mb-10"
        ></div>
        <div
          id="options-container"
          class="grid grid-cols-1 md:grid-cols-2 gap-4"
        ></div>
      </div>

      <div class="flex justify-between">
        <button
          onclick="prevQuestion()"
          id="prev-button"
          class="px-8 py-4 bg-slate-800 hover:bg-slate-700 rounded-3xl flex items-center gap-2"
        >
          ← Əvvəlki
        </button>
        <button
          onclick="nextQuestion()"
          id="next-button"
          class="px-8 py-4 bg-slate-800 hover:bg-slate-700 rounded-3xl flex items-center gap-2"
        >
          Növbəti →
        </button>
      </div>
    </div>

    <!-- NƏTİCƏ EKRANI (YENİLƏNİB - Yan-yana və daha gözəl) -->
    <div id="result-screen" class="hidden max-w-4xl mx-auto px-8 py-16">
      <div class="text-center mb-12">
        <h2 class="text-5xl font-bold mb-3">Mübarizə Bitdi!</h2>
        <p id="result-subtitle" class="text-xl text-slate-400"></p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-2xl mx-auto">
        <!-- Düzgün Cavablar -->
        <div
          class="result-card rounded-3xl p-10 text-center border border-emerald-500/30"
        >
          <div class="text-7xl mb-4">✅</div>
          <div id="correct-count" class="text-6xl font-bold text-emerald-400">
            8
          </div>
          <div class="text-emerald-400 text-xl font-medium mt-2">
            DÜZGÜN CAVAB
          </div>
        </div>

        <!-- Səhv Cavablar -->
        <div
          class="result-card rounded-3xl p-10 text-center border border-red-500/30"
        >
          <div class="text-7xl mb-4">❌</div>
          <div id="incorrect-count" class="text-6xl font-bold text-red-400">
            2
          </div>
          <div class="text-red-400 text-xl font-medium mt-2">
            SƏHV / VAXT BİTDİ
          </div>
        </div>
      </div>

      <div class="mt-16 flex flex-wrap justify-center gap-4">
        <button
          onclick="restartSameCategory()"
          class="px-10 py-6 bg-gradient-to-r from-cyan-400 to-violet-500 text-slate-950 rounded-3xl text-xl font-semibold"
        >
          Eyni Kateqoriyanı Təkrarla
        </button>
        <button
          onclick="goBackToCategories()"
          class="px-10 py-6 bg-slate-800 hover:bg-slate-700 rounded-3xl text-xl font-semibold"
        >
          Başqa Kateqoriya Seç
        </button>
      </div>
    </div>
  </body>
</html>
